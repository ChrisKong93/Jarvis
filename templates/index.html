<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f172a;
            display: flex;
        }

        .sidebar {
            width: 240px;
            min-width: 240px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }

        .agent-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .agent-info p {
            font-size: 12px;
            color: #94a3b8;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .stats-panel {
            flex: 1;
            overflow-y: auto;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 12px;
        }

        .stat-label { color: #94a3b8; }
        .stat-value { color: white; font-weight: 500; }

        .sidebar-actions {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #334155;
        }

        .sidebar-btn {
            width: 100%;
            padding: 10px 14px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            font-size: 13px;
            color: #a5b4fc;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .sidebar-btn.danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .sidebar-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100%;
        }

        .header {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #22c55e;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .model-badge {
            padding: 4px 12px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: #a5b4fc;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px;
            background: #0f172a;
            min-height: 0;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .message-role {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 10px;
        }

        .message-role.user {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
        }

        .message-role.assistant {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .message-role.tool {
            background: rgba(249, 115, 22, 0.2);
            color: #fdba74;
        }

        .message-time {
            font-size: 11px;
            color: #64748b;
        }

        .message-content {
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            color: #e2e8f0;
            border: 1px solid rgba(99, 102, 241, 0.3);
            margin-left: auto;
            max-width: 70%;
        }

        .message.assistant .message-content {
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            border: 1px solid #334155;
            max-width: 80%;
        }

        .message.tool .message-content {
            background: rgba(249, 115, 22, 0.1);
            border: 1px dashed rgba(249, 115, 22, 0.3);
            max-width: 80%;
        }

        .thinking-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .tool-result {
            margin-top: 8px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 13px;
            color: #cbd5e1;
            font-family: 'SF Mono', monospace;
        }

        .message-stats {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            padding-left: 12px;
            font-size: 11px;
            color: #64748b;
            font-family: 'SF Mono', monospace;
        }

        .input-container {
            padding: 20px 24px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-top: 1px solid #334155;
            display: flex;
            gap: 12px;
        }

        .input-container textarea {
            flex: 1;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            border-radius: 14px;
            font-size: 14px;
            color: white;
            resize: none;
            outline: none;
            transition: all 0.2s;
            min-height: 52px;
            max-height: 160px;
            font-family: inherit;
        }

        .input-container textarea:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-container textarea::placeholder {
            color: #64748b;
        }

        .send-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 14px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #6366f1;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 50%;
            color: #64748b;
            text-align: center;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
        }

        .empty-state p {
            font-size: 14px;
            max-width: 300px;
        }

        .tools-sidebar {
            width: 220px;
            min-width: 220px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .tools-panel {
            flex: 1;
            overflow-y: auto;
        }

        .tool-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-item:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateX(-2px);
        }

        .tool-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .tool-icon.calculator { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .tool-icon.search { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .tool-icon.weather { background: rgba(249, 115, 22, 0.15); color: #f97316; }
        .tool-icon.file { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; }
        .tool-icon.clock { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }

        .tool-name {
            font-size: 13px;
            font-weight: 600;
            color: white;
        }

        .tool-desc {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 2px;
        }

        @media (max-width: 1024px) {
            .tools-sidebar {
                width: 180px;
            }
            .sidebar {
                width: 200px;
            }
        }

        @media (max-width: 768px) {
            .tools-sidebar {
                display: none;
            }
            .sidebar {
                width: 60px;
                min-width: 60px;
                padding: 10px;
            }
            .agent-info {
                display: none;
            }
            .section-title, .stat-label {
                display: none;
            }
            .stat-item {
                justify-content: center;
            }
            .message-content {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="avatar">J</div>
            <div class="agent-info">
                <h2>Jarvis Agent</h2>
                <p>智能助手 v1.0</p>
            </div>
        </div>

        <div class="stats-panel">
            <div class="section-title">会话统计</div>
            <div class="stat-item">
                <span class="stat-label">消息数</span>
                <span class="stat-value" id="stat-messages">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">工具调用</span>
                <span class="stat-value" id="stat-tools">0</span>
            </div>
        </div>

        <div class="sidebar-actions">
            <button class="sidebar-btn" onclick="newSession()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新会话
            </button>
            <button class="sidebar-btn danger" onclick="clearChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                清空对话
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-left">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>已连接</span>
                </div>
                <span class="model-badge" id="model-badge">模型加载中...</span>
            </div>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="empty-state">
                <h3>欢迎使用 Jarvis Agent</h3>
                <p>我是您的智能助手，可以帮助您完成各种任务。试试让我计算、搜索或查询天气吧！</p>
            </div>
        </div>

        <div class="input-container">
            <textarea id="message-input" placeholder="输入您的问题，或点击右侧工具..." onkeydown="handleKeyDown(event)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                发送
            </button>
        </div>
    </div>

    <div class="tools-sidebar">
        <div class="section-title">可用工具</div>
        <div class="tools-panel">
            <div class="tool-item" onclick="insertTool('calculator')">
                <div class="tool-icon calculator">🧮</div>
                <div>
                    <div class="tool-name">计算器</div>
                    <div class="tool-desc">数学表达式计算</div>
                </div>
            </div>
            <div class="tool-item" onclick="insertTool('search')">
                <div class="tool-icon search">🔍</div>
                <div>
                    <div class="tool-name">搜索</div>
                    <div class="tool-desc">互联网信息检索</div>
                </div>
            </div>
            <div class="tool-item" onclick="insertTool('weather')">
                <div class="tool-icon weather">🌤️</div>
                <div>
                    <div class="tool-name">天气</div>
                    <div class="tool-desc">城市天气查询</div>
                </div>
            </div>
            <div class="tool-item" onclick="insertTool('file')">
                <div class="tool-icon file">📁</div>
                <div>
                    <div class="tool-name">文件操作</div>
                    <div class="tool-desc">读取/写入文件</div>
                </div>
            </div>
            <div class="tool-item" onclick="insertTool('datetime')">
                <div class="tool-icon clock">🕐</div>
                <div>
                    <div class="tool-name">日期时间</div>
                    <div class="tool-desc">时间查询/定时器</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const modelBadge = document.getElementById('model-badge');
        
        let isProcessing = false;
        let messages = [];
        let toolCallCount = 0;

        function insertTool(toolName) {
            const toolMap = {
                'calculator': '使用计算器计算：',
                'search': '搜索：',
                'weather': '查询天气：',
                'file': '文件操作：',
                'datetime': '日期时间：'
            };
            messageInput.value = toolMap[toolName] || '';
            messageInput.focus();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessage(role, content, options = {}) {
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const header = document.createElement('div');
            header.className = 'message-header';

            const roleBadge = document.createElement('span');
            roleBadge.className = `message-role ${role}`;
            
            const roleNames = {
                'user': '用户',
                'assistant': 'Jarvis',
                'tool': '工具'
            };
            roleBadge.textContent = roleNames[role] || role;

            const time = document.createElement('span');
            time.className = 'message-time';
            const now = new Date();
            time.textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            header.appendChild(roleBadge);
            header.appendChild(time);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (role === 'assistant') {
                contentDiv.innerHTML = markdownToHtml(content);
                
                if (options.thinking) {
                    const thinkingBadge = document.createElement('div');
                    thinkingBadge.className = 'thinking-badge';
                    thinkingBadge.innerHTML = '🤔 ' + options.thinking;
                    messageDiv.insertBefore(thinkingBadge, header.nextSibling);
                }

                if (options.toolInfo) {
                    const toolResult = document.createElement('div');
                    toolResult.className = 'tool-result';
                    toolResult.textContent = `工具调用：${options.toolInfo.tool_name}\n参数：${JSON.stringify(options.toolInfo.parameters)}\n结果：${options.toolInfo.result}`;
                    contentDiv.appendChild(toolResult);
                }
            } else {
                contentDiv.textContent = content;
            }

            messageDiv.appendChild(header);
            messageDiv.appendChild(contentDiv);
            
            if (role === 'assistant' && options.stats) {
                const statsDiv = document.createElement('div');
                statsDiv.className = 'message-stats';
                
                let statsHtml = '';
                if (options.stats.tokens_per_second !== undefined) {
                    statsHtml += `<span>${options.stats.tokens_per_second} tokens/s</span>`;
                }
                if (options.stats.completion_tokens !== undefined) {
                    statsHtml += `<span>${options.stats.completion_tokens} tokens</span>`;
                }
                if (options.stats.response_time !== undefined) {
                    statsHtml += `<span>${options.stats.response_time}s</span>`;
                }
                
                statsDiv.innerHTML = statsHtml;
                messageDiv.appendChild(statsDiv);
            }
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
            updateStats();
        }

        function addTypingIndicator() {
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typing-indicator';

            const header = document.createElement('div');
            header.className = 'message-header';
            
            const roleBadge = document.createElement('span');
            roleBadge.className = 'message-role assistant';
            roleBadge.textContent = 'Jarvis';

            const time = document.createElement('span');
            time.className = 'message-time';
            const now = new Date();
            time.textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            header.appendChild(roleBadge);
            header.appendChild(time);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            
            contentDiv.appendChild(typingDiv);
            messageDiv.appendChild(header);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typing-indicator');
            if (typingDiv) typingDiv.remove();
        }

        function markdownToHtml(text) {
            let html = text;
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            messageInput.disabled = true;
            
            messages.push({ role: 'user', content: message });
            addMessage('user', message);
            
            addTypingIndicator();

            try {
                const response = await fetch(`${API_BASE}/agent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messages,
                        max_tokens: 2048
                    })
                });

                removeTypingIndicator();

                if (!response.ok) throw new Error('请求失败');

                const data = await response.json();
                
                if (data.tool_used) {
                    toolCallCount++;
                }

                messages.push({ role: 'assistant', content: data.content });
                
                addMessage('assistant', data.content, {
                    thinking: data.thinking,
                    toolInfo: data.tool_info,
                    stats: {
                        tokens_per_second: data.tokens_per_second,
                        completion_tokens: data.completion_tokens,
                        response_time: data.response_time
                    }
                });

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `错误: ${error.message}`);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.value = '';
                messageInput.focus();
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function clearChat() {
            chatContainer.innerHTML = `
                <div class="empty-state">
                    <h3>欢迎使用 Jarvis Agent</h3>
                    <p>我是您的智能助手，可以帮助您完成各种任务。试试让我计算、搜索或查询天气吧！</p>
                </div>
            `;
            messages = [];
            toolCallCount = 0;
            updateStats();
        }

        async function newSession() {
            try {
                await fetch(`${API_BASE}/session`, { method: 'POST' });
                clearChat();
            } catch (error) {
                console.error('创建会话失败:', error);
            }
        }

        function updateStats() {
            document.getElementById('stat-messages').textContent = messages.length;
            document.getElementById('stat-tools').textContent = toolCallCount;
        }

        async function loadModelInfo() {
            try {
                const response = await fetch(`${API_BASE}/models`);
                const data = await response.json();
                if (data.models && data.models.length > 0) {
                    modelBadge.textContent = data.models[0].name;
                } else {
                    modelBadge.textContent = '未加载模型';
                }
            } catch (error) {
                modelBadge.textContent = '连接模型失败';
            }
        }

        loadModelInfo();
    </script>
</body>
</html>
