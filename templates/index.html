<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llama.cpp WebUI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            color: white;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, 20px) rotate(5deg); }
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .header .status {
            font-size: 13px;
            margin-top: 6px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #86efac;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .message {
            margin-bottom: 24px;
            display: flex;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .message-inner {
            display: flex;
            flex-direction: column;
            max-width: 70%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.35);
            position: relative;
        }

        .user .message-content::before {
            content: '';
            position: absolute;
            bottom: -6px;
            right: 16px;
            width: 12px;
            height: 12px;
            background: #764ba2;
            transform: rotate(45deg);
        }

        .bot .message-content {
            background: white;
            color: #334155;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            position: relative;
        }

        .bot .message-content::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 16px;
            width: 12px;
            height: 12px;
            background: white;
            border-left: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            transform: rotate(45deg);
        }

        .speed-info {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 8px;
        }

        .speed-info span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .speed-info .token-icon {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
        }

        .message-content h1 { font-size: 1.5em; font-weight: bold; margin: 0.8em 0 0.4em; color: #1e293b; }
        .message-content h2 { font-size: 1.3em; font-weight: bold; margin: 0.7em 0 0.3em; color: #1e293b; }
        .message-content h3 { font-size: 1.1em; font-weight: bold; margin: 0.6em 0 0.3em; color: #1e293b; }
        
        .message-content strong { font-weight: 600; color: #1e293b; }
        .message-content em { font-style: italic; }
        
        .message-content code {
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            font-size: 0.9em;
            color: #e11d48;
        }
        
        .message-content pre {
            background: #f8fafc;
            color: #1e293b;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            margin: 16px -20px;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Roboto Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }
        
        .message-content pre code {
            background: none;
            padding: 0;
            color: inherit;
            font-size: inherit;
            display: block;
            padding: 14px 20px;
            overflow-x: auto;
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .code-language {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .copy-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #64748b;
            cursor: pointer;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .copy-btn:hover {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        
        .copy-btn svg {
            width: 14px;
            height: 14px;
        }
        
        .message-content blockquote {
            border-left: 3px solid #667eea;
            padding-left: 12px;
            margin: 12px 0;
            color: #64748b;
            font-style: italic;
        }
        
        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        
        .message-content li {
            margin: 4px 0;
        }
        
        .message-content a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        
        .message-content a:hover {
            border-bottom-color: #667eea;
        }
        
        .input-container {
            padding: 16px 24px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }

        .input-container textarea {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 52px;
            max-height: 160px;
            background: #f8fafc;
        }

        .input-container textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .input-container textarea::placeholder {
            color: #94a3b8;
        }

        .input-container button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .input-container button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .input-container button:hover::before {
            left: 100%;
        }

        .input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.45);
        }

        .input-container button:active {
            transform: translateY(0);
        }

        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px 20px;
            align-items: center;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6) translateY(0); opacity: 0.5; }
            40% { transform: scale(1) translateY(-4px); opacity: 1; }
        }

        .controls {
            padding: 14px 24px;
            background: white;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .model-info {
            font-size: 13px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #16a34a;
        }

        .clear-btn {
            padding: 7px 16px;
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .clear-btn:hover {
            background: #fef2f2;
            border-color: #fecaca;
            color: #dc2626;
        }

        @media (max-width: 600px) {
            .container {
                height: 95vh;
                border-radius: 10px;
            }

            .message-inner {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Llama.cpp WebUI</h1>
            <div class="status" id="status"><div class="status-dot"></div>连接中...</div>
        </div>
        
        <div class="controls">
            <div class="model-info" id="model-info">模型加载中...</div>
            <button class="clear-btn" onclick="clearChat()">清空对话</button>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="message bot">
                <div class="message-content">您好！我是基于 llama.cpp 的 AI 助手。有什么我可以帮助您的吗？</div>
            </div>
        </div>

        <div class="input-container">
            <textarea id="message-input" placeholder="输入您的问题..." onkeydown="handleKeyDown(event)"></textarea>
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const modelInfoEl = document.getElementById('model-info');

        let isProcessing = false;
        let messages = [];

        function markdownToHtml(text) {
            const codeBlocks = [];
            let codeIndex = 0;
            
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                const placeholder = `__CODE_BLOCK_${codeIndex}__`;
                codeBlocks.push({
                    lang: lang || 'code',
                    code: code.trim()
                });
                codeIndex++;
                return placeholder;
            });
            
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            text = text.replace(/^(#{1,3})\s+(.+)$/gm, (match, hashes, content) => {
                const level = hashes.length;
                return `<h${level}>${content}</h${level}>`;
            });
            
            text = text.replace(/^>\s*(.+)$/gm, '<blockquote>$1</blockquote>');
            
            text = text.replace(/^\s*[-*+]\s+(.+)$/gm, '<ul><li>$1</li></ul>');
            text = text.replace(/<\/ul>\n<ul>/g, '');
            
            text = text.replace(/^\s*\d+\.\s+(.+)$/gm, '<ol><li>$1</li></ol>');
            text = text.replace(/<\/ol>\n<ol>/g, '');
            
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            
            text = text.replace(/\n\n/g, '</p><p>');
            text = text.replace(/\n/g, '<br>');
            
            text = '<p>' + text + '</p>';
            text = text.replace(/<p><\/p>/g, '');
            text = text.replace(/<p><(h[1-3]|ul|ol|blockquote)/g, '<$1');
            text = text.replace(/<\/(h[1-3]|ul|ol|blockquote)><\/p>/g, '</$1>');
            
            text = text.replace(/__CODE_BLOCK_(\d+)__/g, (match, index) => {
                const block = codeBlocks[parseInt(index)];
                if (!block) return match;
                
                const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                const escapedCode = block.code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                return `
                    <pre>
                        <div class="code-header">
                            <span class="code-language">${block.lang}</span>
                            <button class="copy-btn" onclick="copyCode('${codeId}')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                                <span>复制</span>
                            </button>
                        </div>
                        <code id="${codeId}">${escapedCode}</code>
                    </pre>
                `;
            });
            
            return text;
        }
        
        function copyCode(elementId) {
            const codeElement = document.getElementById(elementId);
            if (codeElement) {
                navigator.clipboard.writeText(codeElement.textContent).then(() => {
                    const btn = codeElement.parentElement.parentElement.querySelector('.copy-btn span');
                    if (btn) {
                        const originalText = btn.textContent;
                        btn.textContent = '已复制';
                        setTimeout(() => {
                            btn.textContent = originalText;
                        }, 2000);
                    }
                }).catch(err => {
                    console.error('复制失败:', err);
                });
            }
        }

        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    statusEl.innerHTML = '<div class="status-dot"></div>已连接到 llama.cpp 服务器';
                    statusEl.style.color = '#86efac';
                    loadModels();
                } else {
                    statusEl.innerHTML = '<div class="status-dot" style="background:#fca5a5"></div>无法连接到 llama.cpp 服务器';
                    statusEl.style.color = '#fca5a5';
                }
            } catch (error) {
                statusEl.innerHTML = '<div class="status-dot" style="background:#fca5a5"></div>连接错误';
                statusEl.style.color = '#fca5a5';
            }
        }

        async function loadModels() {
            try {
                const response = await fetch(`${API_BASE}/models`);
                const data = await response.json();
                
                if (data.models && data.models.length > 0) {
                    modelInfoEl.innerHTML = `<span class="model-badge">📦</span>当前模型: ${data.models[0].name}`;
                } else {
                    modelInfoEl.innerHTML = '<span class="model-badge" style="background:#fef2f2;color:#dc2626">⚠️</span>未加载模型';
                }
            } catch (error) {
                modelInfoEl.textContent = '获取模型信息失败';
            }
        }

        function addMessage(role, content, speedInfo = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const innerDiv = document.createElement('div');
            innerDiv.className = 'message-inner';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (role === 'bot') {
                contentDiv.innerHTML = markdownToHtml(content);
            } else {
                contentDiv.textContent = content;
            }
            
            innerDiv.appendChild(contentDiv);
            
            if (speedInfo && role === 'bot') {
                const speedDiv = document.createElement('div');
                speedDiv.className = 'speed-info';
                
                let speedHtml = '';
                if (speedInfo.tokensPerSecond !== undefined) {
                    speedHtml += `<span><div class="token-icon"></div>${speedInfo.tokensPerSecond} tokens/s</span>`;
                }
                if (speedInfo.responseTime !== undefined) {
                    speedHtml += `<span>⏱️ ${speedInfo.responseTime}s</span>`;
                }
                if (speedInfo.completionTokens !== undefined) {
                    speedHtml += `<span>📝 ${speedInfo.completionTokens} tokens</span>`;
                }
                
                speedDiv.innerHTML = speedHtml;
                innerDiv.appendChild(speedDiv);
            }
            
            messageDiv.appendChild(innerDiv);
            chatContainer.appendChild(messageDiv);
            
            scrollToBottom();
            return contentDiv;
        }

        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typing-indicator';
            
            const innerDiv = document.createElement('div');
            innerDiv.className = 'message-inner';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            
            contentDiv.appendChild(typingDiv);
            innerDiv.appendChild(contentDiv);
            messageDiv.appendChild(innerDiv);
            chatContainer.appendChild(messageDiv);
            
            scrollToBottom();
            return messageDiv;
        }

        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typing-indicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;
            messageInput.disabled = true;
            messageInput.value = '';

            addMessage('user', message);
            messages.push({ role: 'user', content: message });
            const typingDiv = addTypingIndicator();

            try {
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('请求超时')), 300000)
                );
                
                const fetchPromise = fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: messages,
                        stream: false,
                        max_tokens: 2048,
                        temperature: 0.7,
                        top_p: 0.9,
                        stop: ["</s>"]
                    })
                });

                const response = await Promise.race([fetchPromise, timeoutPromise]);

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error('请求失败');
                }

                const data = await response.json();
                
                if (data.choices && data.choices[0] && data.choices[0].message) {
                    let reply = data.choices[0].message.content;
                    
                    reply = reply.replace(/<\/s>$/g, '').trim();
                    
                    messages.push({ role: 'assistant', content: reply });
                    
                    const speedInfo = {
                        tokensPerSecond: data.tokens_per_second,
                        responseTime: data.response_time,
                        completionTokens: data.usage ? data.usage.completion_tokens : undefined
                    };
                    
                    addMessage('bot', reply, speedInfo);
                } else if (data.content) {
                    let reply = data.content;
                    reply = reply.replace(/<\/s>$/g, '').trim();
                    messages.push({ role: 'assistant', content: reply });
                    addMessage('bot', reply);
                } else {
                    addMessage('bot', '抱歉，我无法回答这个问题。');
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('bot', `错误: ${error.message}`);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function clearChat() {
            chatContainer.innerHTML = '';
            messages = [];
