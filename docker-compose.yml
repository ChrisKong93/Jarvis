services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 中国大陆用户可在 .env 中设置 PIP_INDEX_URL 加速 pip 安装
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    # Apple Silicon (M1/M2/M3) 可取消下方注释以 x86 兼容模式运行
    # platform: linux/amd64
    container_name: jarvis
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8000}
    volumes:
      # 持久化数据：SQLite、ChromaDB 向量库、会话
      - ./data:/app/data
      # Embedding 模型缓存（避免每次启动重复下载）
      - embedding_cache:/app/backend/memory/embeddings_cache
    # 优雅关闭：接收 SIGTERM 并转发给主进程
    init: true
    # 健康检查
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  embedding_cache:
